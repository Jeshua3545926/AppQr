{% extends "base.html" %}

{% block title %}Login Usuario{% endblock %}

{% block content %}
        <section class="card login-card hero-card">
            <span class="eyebrow">Empleado</span>
            <h1>Acceso Usuario</h1>
            <p class="lead">Selecciona tu nombre para iniciar sesión y usar el escáner con un flujo rápido y limpio.</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST" class="stack-form">
                <label>Empleado</label>
                <select name="empleado_id" required>
                    <option value="">Selecciona un empleado</option>
                    {% for e in empleados %}
                    <option value="{{ e.id }}">{{ e.nombre }}</option>
                    {% endfor %}
                </select>

                <button class="btn" type="submit">Iniciar sesión</button>
            </form>

            <div class="extra-links">
                <a class="btn secondary" href="/login">Login admin</a>
            </div>
        </section>
{% endblock %}
