<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Registro</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="container">
        <section class="card hero-card">
            <span class="eyebrow">Confirmacion</span>
            <h1>Confirmar llegada/recolección</h1>
            <p class="helper-text">Local detectado</p>
            <h2>{{ local.nombre }}</h2>

            {% if role == "user" %}
            <div class="session-info">
                <p>Empleado en sesión: <strong>{{ selected_user_name }}</strong></p>
            </div>
            <input type="hidden" id="empleadoId" value="{{ selected_user_id }}">
            {% else %}
            <label>Empleado</label>
            <select id="empleadoId">
                {% for e in empleados %}
                <option value="{{ e.id }}" {% if selected_user_id == e.id %}selected{% endif %}>{{ e.nombre }}</option>
                {% endfor %}
            </select>
            {% endif %}

            <button class="btn" id="btnRegistrar" data-token="{{ local.qr_token }}">
                Registrar
            </button>

            <div id="resultado" class="alert hidden"></div>
            <div class="inline-actions">
                <a class="btn secondary" href="/scanner">Abrir escáner</a>
            </div>
        </section>
    </main>

    <script>
        const selectedUserId = "{{ selected_user_id or '' }}";
        if (selectedUserId) {
            const select = document.getElementById("empleadoId");
            if (select) {
                select.value = selectedUserId;
            }
        }
    </script>
    <script src="/static/confirmar.js"></script>
</body>
</html>
